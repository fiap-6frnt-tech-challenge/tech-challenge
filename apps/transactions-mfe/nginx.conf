server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Short-circuit CORS preflights — sem isso OPTIONS cai no try_files e retorna 404,
  # o que faz o browser rejeitar o preflight mesmo com os headers corretos.
  if ($request_method = 'OPTIONS') {
    add_header Access-Control-Allow-Origin  "http://localhost:3000";
    add_header Access-Control-Allow-Methods "GET, OPTIONS";
    add_header Access-Control-Allow-Headers "*";
    return 204;
  }

  # CORS para o shell consumir remoteEntry/mf-manifest cross-origin.
  # Origin restrita ao shell local (compose). Em prod, vercel.json aplica a origin de prod.
  # Vary: Origin omitido — valor fixo, não varia por origin.
  add_header Access-Control-Allow-Origin  "http://localhost:3000" always;
  add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
  add_header Access-Control-Allow-Headers "*" always;

  # mf-manifest.json e chunks não devem ser cacheados de forma agressiva.
  # add_header NÃO herda do server quando o location tem seus próprios add_header,
  # então repetimos o CORS aqui — senão o shell não consegue ler o manifest cross-origin.
  location = /mf-manifest.json {
    add_header Access-Control-Allow-Origin  "http://localhost:3000" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "*" always;
    add_header Cache-Control "no-cache" always;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
