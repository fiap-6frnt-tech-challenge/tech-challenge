name: CI

on:
  pull_request:
    branches:
      - phase-2
      - main
  push:
    branches:
      - phase-2
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint + Build + Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history para Turbo --affected resolver merge-base do PR

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.18.0'
          cache: 'npm'

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ github.ref_name }}-
            turbo-${{ github.job }}-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx turbo run lint --affected --filter='!@bytebank/hello-mfe'

      - name: Type check
        run: npx turbo run type-check --affected

      - name: Build
        run: npx turbo run build --affected

      - name: Test
        run: npx turbo run test --affected
